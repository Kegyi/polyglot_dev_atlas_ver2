<body class="theme-dark">
    <!-- 1. TOP HEADER: [MODE] | [SLOTS] | [STYLES] -->
    <header id="atlas-header">
        <div class="header-left">
            <button class="mode-btn active" id="mode-atlas">ATLAS</button>
            <button class="mode-btn" id="mode-course">COURSE</button>
        </div>
        
        <div class="header-center">
            <div class="slot" id="slot-l">Primary</div>
            <button id="swap-btn">⇄</button>
            <div class="slot" id="slot-r">Secondary</div>
        </div>

        <div class="header-right">
            <div class="style-group">
                <button class="style-btn" title="Compact">≡</button>
                <button class="style-btn" title="Comfort">A</button>
            </div>
            <button id="theme-toggle">🌙</button>
        </div>
    </header>

    <!-- 2. LANG PICKER: Horizontal strip under header -->
    <nav id="language-picker">
        {{ language_picker }}
    </nav>

    <!-- 3. MAIN AREA: Sidebar | Content | TOC -->
    <div id="main-container">
        <aside id="nav-sidebar">
            {{ navigation_sidebar }}
        </aside>

        <main id="content-stage">
            <header class="page-header">
                <h1>{{ title }}</h1>
            </header>
            <div class="page-blocks">
                {{ content }}
            </div>
        </main>

        <aside id="topic-sidebar">
            {{ topic_sidebar }}
        </aside>
    </div>
</body>
