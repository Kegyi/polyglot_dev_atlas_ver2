<!DOCTYPE html>
<html lang="en" data-theme="dark" data-view-mode="all" data-selection-mode="single" data-primary="" data-secondary="" data-global-style="round">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#09090b">
    <meta name="description" content="Polyglot Dev Atlas - Multi-language comparison framework for developers. Side-by-side code examples across C++, Go, Python, TypeScript, and Scala.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Polyglot Atlas">
    <title>{{ title }}</title>
    
    <!-- Web App Manifest for PWA installation -->
    <link rel="manifest" href="{{ asset_prefix }}assets/manifest.json">
    
    <!-- Blocking Anti-Flash & Root State Injection -->
    <script>
        (function() {
            // 1. Load all persisted states from LocalStorage
            const savedTheme = localStorage.getItem('atlas-theme') || 'dark';
            const savedPalette = localStorage.getItem('atlas-palette') || 'zinc';
            const savedTopicView = localStorage.getItem('atlas-view-mode') || 'all';
            const savedSelectionMode = localStorage.getItem('atlas-selection-mode') || 'single';
            const savedPrimary = localStorage.getItem('atlas-primary-lang') || '';
            const savedSecondary = localStorage.getItem('atlas-secondary-lang') || '';
            
            // Phase 3: Global Design Style (Sharp, Round, Airy)
            const savedGlobalStyle = localStorage.getItem('atlas-global-style') || 'round';

            // 2. Set attributes on documentElement immediately. 
            const doc = document.documentElement;
            doc.setAttribute('data-theme', savedTheme);
            doc.setAttribute('data-palette', savedPalette);
            doc.setAttribute('data-view-mode', savedTopicView);
            doc.setAttribute('data-selection-mode', savedSelectionMode);
            doc.setAttribute('data-primary', savedPrimary);
            doc.setAttribute('data-secondary', savedSecondary);

            // Navigation sidebar: keep user-collapsed state before first paint.
            const savedLeftSidebar = localStorage.getItem('atlas-sidebar-left-collapsed');
            const leftCollapsed = savedLeftSidebar === '1';
            doc.setAttribute('data-sidebar-left-collapsed', leftCollapsed ? 'true' : 'false');

            // Topic sidebar: collapse by default unless user explicitly opened it.
            const savedRightSidebar = localStorage.getItem('atlas-sidebar-right-collapsed');
            const rightCollapsed = savedRightSidebar === null ? true : savedRightSidebar === '1';
            doc.setAttribute('data-sidebar-right-collapsed', rightCollapsed ? 'true' : 'false');

            // Firefox/tablet can apply native hash scrolling before app init.
            // Cache hash and clear it for first paint; app.js restores + navigates
            // inside the content pane to keep the top header visible.
            try {
                if (window.location.hash) {
                    window.__atlasInitialHash = window.location.hash;
                    if (window.history && typeof window.history.replaceState === 'function') {
                        window.history.replaceState(null, '', window.location.pathname + window.location.search);
                    }
                }
            } catch (e) {}
            
            // Phase 3 Attribute
            doc.setAttribute('data-global-style', savedGlobalStyle);

            // If the user had Showcases or any collection open previously, mark root early
            try {
                // Determine approximate mode from path for early restore
                var path = window.location.pathname || '';
                var modeKey = 'atlas';
                if (path.indexOf('/meta/') !== -1 || path.indexOf('/meta') === 0) modeKey = 'meta';
                else if (path.indexOf('/course/') !== -1 || path.indexOf('/course') === 0) modeKey = 'course';

                // Legacy: Showcases-specific flag
                if (localStorage.getItem(modeKey + '-showcases-open') === '1') doc.classList.add('showcases-open');

                // New: Generic collection flags follow the pattern {mode}-collection-{key}-open
                // If any such flag exists and is set, add a generic marker to prevent
                // the main nav from flashing before JS runs to open the specific list.
                for (var i = 0; i < localStorage.length; i++) {
                    var k = localStorage.key(i);
                    try {
                        if (k && k.indexOf(modeKey + '-collection-') === 0 && k.endsWith('-open') && localStorage.getItem(k) === '1') {
                            // Extract the collection key between modeKey + '-collection-' and '-open'
                            var middle = k.substring((modeKey + '-collection-').length, k.length - '-open'.length);
                            var collectionPath = '/' + modeKey + '/' + middle.replace(/-/g, '/') + '/';
                            if (path.toLowerCase().indexOf(collectionPath.toLowerCase()) === -1) {
                                continue;
                            }
                            // Sanitize to match the builder's safe_key (non-alphanumerics -> '-')
                            var safe = middle.replace(/[^a-zA-Z0-9_-]/g, '-');
                            var listId = 'toc-collection-' + modeKey + '-' + safe;
                            // Add a class to hide the main nav immediately
                            doc.classList.add('collection-open');
                            // Also set a data attribute with the specific list id so JS/CSS
                            // can target it. Inject a small style rule so the exact submenu
                            // is visible immediately when the DOM renders.
                            try {
                                var css = '#' + listId + ' { display: block !important; }';
                                var s = document.createElement('style');
                                s.setAttribute('data-generated', 'collection-open-style');
                                s.appendChild(document.createTextNode(css));
                                document.head.appendChild(s);
                                doc.setAttribute('data-collection-open', listId);
                            } catch (e) {}
                            break;
                        }
                    } catch (e) {}
                }
            } catch (e) {}

            // 3. Setup Syntax Highlighting CSS path
            const hljsStyle = savedTheme === 'dark' ? 'atom-one-dark.min.css' : 'github.min.css';
            window.hljsStylePath = `{{ asset_prefix }}assets/hljs/${hljsStyle}`;
            
            // 4. Setup Theme CSS path and store asset prefix globally
            window.assetPrefix = '{{ asset_prefix }}';
            window.themeStylePath = `{{ asset_prefix }}assets/css/themes/${savedTheme}.css`;
        })();
    </script>

    <!-- Syntax Highlighting Theme -->
    <link id="hljs-theme" rel="stylesheet" href="">
    <script>document.getElementById('hljs-theme').href = window.hljsStylePath;</script>

    <link rel="stylesheet" href="{{ asset_prefix }}assets/css/main.css">
    <!-- Theme CSS (Light/Dark/High-Contrast) -->
    <link id="theme-css" rel="stylesheet" href="">
    <script>document.getElementById('theme-css').href = window.themeStylePath;</script>
    <link rel="stylesheet" href="{{ asset_prefix }}assets/css/ui_states.css">
    {{ extra_assets }}
</head>
<body class="{{ body_class_placeholders }}">
    <div id="navbar">
        <div class="nav-top">
            <div class="nav-left">
                <div class="logo-with-modes">
                    <span class="logo" id="app-main-title">POLYGLOT</span>
                    {{ mode_switcher }}
                </div>
            </div>
            <div class="nav-center">
                <div id="view-mode-control" class="view-mode-control">
                    <button id="selection-mode-btn" class="view-mode-label">Single</button>
                    <button id="swap-btn" class="swap-inline" aria-label="Swap languages">&#8646;</button>
                </div>
                <div class="atlas-search">
                    <input id="atlas-search-input" type="search" placeholder="Search atlas (/ or Ctrl+K)" autocomplete="off">
                    <div id="atlas-search-results" class="search-results" hidden></div>
                </div>
            </div>
            <div class="nav-right">
                <div class="style-picker-dropdown">
                    <button id="style-picker-btn" class="picker-trigger" title="Geometric style" onclick="app.toggleStylePicker()"></button>
                    <div id="style-picker-panel" class="picker-panel" hidden>
                        <button class="style-dot" data-style="sharp" title="Sharp" onclick="app.setGlobalStyle('sharp')"></button>
                        <button class="style-dot" data-style="round" title="Round" onclick="app.setGlobalStyle('round')"></button>
                        <button class="style-dot" data-style="airy" title="Airy" onclick="app.setGlobalStyle('airy')"></button>
                    </div>
                </div>
                <div class="palette-picker-dropdown">
                    <button id="palette-picker-btn" class="picker-trigger" title="Color palette" onclick="app.togglePalettePicker()">
                        <span id="palette-current-dot" class="color-dot-preview"></span>
                    </button>
                    <div id="palette-picker-panel" class="picker-panel" hidden>
                        <div class="color-dot" style="background: #71717a" title="Zinc" onclick="app.setPalette('zinc')"></div>
                        <div class="color-dot" style="background: #ef4444" title="Red" onclick="app.setPalette('red')"></div>
                        <div class="color-dot" style="background: #fb923c" title="Orange" onclick="app.setPalette('orange')"></div>
                        <div class="color-dot" style="background: #f59e0b" title="Yellow" onclick="app.setPalette('yellow')"></div>
                        <div class="color-dot" style="background: #10b981" title="Green" onclick="app.setPalette('green')"></div>
                        <div class="color-dot" style="background: #38bdf8" title="Ocean" onclick="app.setPalette('ocean')"></div>
                        <div class="color-dot" style="background: #3b82f6" title="Blue" onclick="app.setPalette('blue')"></div>
                        <div class="color-dot" style="background: #6366f1" title="Indigo" onclick="app.setPalette('indigo')"></div>
                        <div class="color-dot" style="background: #8b5cf6" title="Violet" onclick="app.setPalette('violet')"></div>
                    </div>
                </div>
                <button id="theme-toggle" class="icon-btn" onclick="app.toggleTheme()"></button>
            </div>
        </div>
        <div class="nav-bottom">
            <div class="lang-selector-list">
                {{ language_selection_buttons }}
            </div>
        </div>
    </div>

    <div id="container">
        <aside id="sidebar-left">
            <div class="sidebar-handle sidebar-handle-left" onclick="app.toggleSidebar('left')" aria-label="Hide navigation sidebar">
                <span class="sidebar-handle-label">Navigation</span>
                <span class="sidebar-handle-arrow" aria-hidden="true">&#9664;</span>
            </div>
            <div class="sidebar-content">
                <div class="sidebar-label">Navigation</div>
                {{ navigation_sidebar }}
            </div>
        </aside>
        
        <main id="content">
            <div class="content-wrapper">
                {{ breadcrumbs }}
                {{ content }}
                {{ pager_nav }}
            </div>
        </main>

        <aside id="sidebar-right">
            <div class="sidebar-handle sidebar-handle-right" onclick="app.toggleSidebar('right')" aria-label="Show topics sidebar">
                <span class="sidebar-handle-label">Topics</span>
                <span class="sidebar-handle-arrow" aria-hidden="true">&#9664;</span>
            </div>
            <div class="sidebar-content">
                <div class="sidebar-header-row">
                    <div class="sidebar-label">Topics</div>
                    <div class="density-controls">
                        <!-- Phase 2: Density Toggle -->
                        <button id="density-toggle-btn" class="mini-toggle" onclick="app.toggleSidebarDensity()">Detailed</button>
                        <!-- View Mode Toggle -->
                        <button id="view-mode-btn" class="mini-toggle" onclick="app.toggleViewMode()">All</button>
                    </div>
                </div>
                {{ topic_sidebar }}
            </div>
        </aside>
    </div>

    <!-- Syntax Highlighter Core and Language Definitions -->
    <script src="{{ asset_prefix }}assets/hljs/highlight.min.js"></script>
    <script src="{{ asset_prefix }}assets/hljs/languages/scala.min.js"></script>
    
    <!-- Markdown Renderer (offline/local) -->
    <script src="{{ asset_prefix }}assets/js/marked.offline.js"></script>
    
    <!-- App Logic & Selection Engine -->
    <script src="{{ asset_prefix }}assets/js/app.js"></script>
    <script src="{{ asset_prefix }}assets/js/selection_engine.js"></script>
    <script src="{{ asset_prefix }}assets/js/content_renderers.js"></script>
    <script src="{{ asset_prefix }}assets/js/markdown_renderer.js"></script>
    <script src="{{ asset_prefix }}assets/js/search_ui.js"></script>
    <script src="{{ asset_prefix }}assets/js/permalinks.js"></script>
</body>
</html>
