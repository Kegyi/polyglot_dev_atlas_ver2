<body data-palette="zinc" data-theme="dark" class="hide-toc">

    <!-- 1. GLOBAL HEADER -->

    </nav>

            </div>
            <div class="sidebar-content" id="nav-content">
                <div class="nav-item active" onclick="location.href='../index.html'">📊 Dashboard</div><div class="sidebar-title">Tracks</div><div class="nav-item" onclick="location.href='../course/course_dashboard.html'">Course Dashboard</div>
            </div>
        </aside>

        <main id="content-stage">
            <div class="page-content">
                <div class="page-title">Course Dashboard</div>

        <aside id="topic-sidebar">
            <div class="sidebar-handle" id="handle-r" onclick="document.body.classList.toggle('toc-collapsed')">

            </div>
            <div class="sidebar-content" id="topic-content">
                
            </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js" data-fallback="../assets/hljs/highlight.min.js" onerror="if(!this.dataset.fallbackApplied){this.dataset.fallbackApplied='1';this.src=this.dataset.fallback;}else{window.__hljsMissingFallback=true;}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/scala.min.js" data-fallback="../assets/hljs/languages/scala.min.js" onerror="if(!this.dataset.fallbackApplied){this.dataset.fallbackApplied='1';this.src=this.dataset.fallback;}else{window.__hljsMissingFallback=true;}"></script>
    <!-- Scripts: provide AtlasStorage wrapper (so state.js can use a safe storage API) -->
    <script>
    (function(){
        try {
            // Test native localStorage availability
            var ok = false;
            try { localStorage.setItem('__atlas_test','1'); localStorage.removeItem('__atlas_test'); ok = true; } catch(e) { ok = false; }
            if (ok) {
                // Use native localStorage (but expose a wrapper API for compatibility)
                window.AtlasStorage = {
                    getItem: function(k){ return localStorage.getItem(k); },
                    setItem: function(k,v){ localStorage.setItem(k,v); },
                    removeItem: function(k){ localStorage.removeItem(k); },
                    isNative: true
                };
            } else {
                // Fallback: in-memory storage with eventual sync attempt
                var mem = {};
                window.AtlasStorage = {
                    getItem: function(k){ return mem.hasOwnProperty(k) ? mem[k] : null; },
                    setItem: function(k,v){ mem[k]=String(v); },
                    removeItem: function(k){ delete mem[k]; },
                    isNative: false,
                    _mem: mem,
                    trySync: function(){
                        try {
                            localStorage.setItem('__atlas_sync_test','1'); localStorage.removeItem('__atlas_sync_test');
                            // sync all keys
                            for (var key in mem) {
                                if (mem.hasOwnProperty(key)) localStorage.setItem(key, mem[key]);
                            }
                            // if successful, switch to native
                            window.AtlasStorage = {
                                getItem: function(k){ return localStorage.getItem(k); },
                                setItem: function(k,v){ localStorage.setItem(k,v); },
                                removeItem: function(k){ localStorage.removeItem(k); },
                                isNative: true
                            };
                            return true;
                        } catch(e) { return false; }
                    }
                };
            }
        } catch(e) {
            // Final fallback: minimal in-memory
            var mem2 = {};
            window.AtlasStorage = {
                getItem: function(k){ return mem2.hasOwnProperty(k) ? mem2[k] : null; },
                setItem: function(k,v){ mem2[k]=String(v); },
                removeItem: function(k){ delete mem2[k]; },
                isNative: false,
                _mem: mem2
            };
        }
    })();
    </script>
    <!-- Scripts: State must load before UI -->
    <script src="../assets/js/state.js"></script>
    <script src="../assets/js/ui.js"></script>
</body>
</html>
