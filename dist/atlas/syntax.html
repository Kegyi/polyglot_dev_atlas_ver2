<!DOCTYPE html>
<!-- 
    The <html> element holds the state of the UI.
    Sidebars: 'visible' or 'hidden'
    Theme: 'dark' or 'light'
    Palette: 'default', 'nord', or 'matrix'
    View Mode: 'focused' or 'all'
-->
<html lang="en" 
      data-theme="dark" 
      data-palette="default" 
      data-sidebar-l="visible" 
      data-sidebar-r="visible" 
      data-view-mode="focused">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Syntax | Atlas</title>

    <!-- CRITICAL: Anti-Flash Script (Blocking) -->
    <script>
        (function() {
            // Immediately restore UI state from localStorage
            const theme = localStorage.getItem('theme') || 'dark';
            const palette = localStorage.getItem('palette') || 'default';
            const sl = localStorage.getItem('sidebar-l') || 'visible';
            const sr = localStorage.getItem('sidebar-r') || 'visible';
            const view = localStorage.getItem('view-mode') || 'focused';

            const doc = document.documentElement;
            doc.setAttribute('data-theme', theme);
            doc.setAttribute('data-palette', palette);
            doc.setAttribute('data-sidebar-l', sl);
            doc.setAttribute('data-sidebar-r', sr);
            doc.setAttribute('data-view-mode', view);

            // Add loading class to keep body hidden until JS reveals it
            doc.classList.add('is-loading');
        })();
    </script>

    <!-- Base Styles (Prefixed for sub-pages) -->
    <link rel="stylesheet" href="../assets/css/style.css">
    
    <!-- Page-specific CSS/JS from JSON -->
    

    <style>
        /* FOUC Protection: Body is invisible while 'is-loading' is present */
        html.is-loading body {
            visibility: hidden;
            opacity: 0;
            /* Matches default dark theme background to prevent white-flash */
            background-color: #0f172a; 
        }
    </style>
</head>
<body class="mode-atlas atlas-view syntax-page">

    <!-- 1. TOP HEADER -->
    <header class="main-header">
        <div class="header-section">
            <div class="logo">POLYGLOT <span>ATLAS</span></div>
            <!-- Placeholder: Atlas/Course toggle -->
            <div class="mode-switcher-wrapper">
                <div class="mode-switcher"><a href="../index.html" class="mode-btn active">Atlas</a><a href="../course/intro.html" class="mode-btn ">Course</a></div>
            </div>
        </div>

        <div class="header-section">
            <div class="palette-theme">
                <!-- Palette Selector Indicators -->
                <div class="palette-group">
                    <div class="pal-indicator p-def" onclick="app.setPalette('default', this)"><i></i><i></i></div>
                    <div class="pal-indicator p-nord" onclick="app.setPalette('nord', this)"><i></i><i></i></div>
                    <div class="pal-indicator p-mat" onclick="app.setPalette('matrix', this)"><i></i><i></i></div>
                </div>
                <!-- Theme Toggle -->
                <button class="theme-btn" onclick="app.toggleTheme()" id="themeIcon">☼</button>
            </div>
        </div>
    </header>

    <!-- 2. PROGRAMMING LANGUAGE SELECTOR BAR -->
    <nav class="selector-bar">
        <div class="selector-container"><button class="lang-pill" data-lang-id="cpp" style="--lang-color: #00599C">C++</button><button class="lang-pill" data-lang-id="go" style="--lang-color: #00ADD8">Go</button><button class="lang-pill" data-lang-id="python" style="--lang-color: #3776AB">Python</button><button class="lang-pill" data-lang-id="typescript" style="--lang-color: #3178C6">TypeScript</button><button class="lang-pill" data-lang-id="scala2" style="--lang-color: #DE3423">Scala 2</button><button class="lang-pill" data-lang-id="scala3" style="--lang-color: #DE3423">Scala 3</button><button class="swap-btn" onclick="app.swapLanguages()">⇄ SWAP</button></div>
    </nav>

    <!-- 3. MAIN LAYOUT CONTAINER -->
    <div class="app-container">
        
        <!-- Sidebar Left (Global Nav) -->
        <aside class="sidebar-left">
            <div class="edge-toggle toggle-l" onclick="app.toggleSidebar('l')">◀</div>
            <div class="sidebar-inner">
                <ul class="nav-list"><li class=""><a href="../index.html">Welcome | Polyglot Dev Atlas</a></li><li class=""><a href="../atlas/design_patterns.html">Design Patterns</a></li><li class="active"><a href="../atlas/syntax.html">Basic Syntax | Atlas</a></li></ul>
            </div>
        </aside>

        <!-- Main Content View -->
        <main id="main-scroll-area">
            <!-- view-mode toggle moved to the topic sidebar -->

            <!-- Pre-Built Modular Content -->
            <div class="content-wrapper">
                
            </div>
        </main>

        <!-- Sidebar Right (Topic Nav) -->
        <aside class="sidebar-right">
            <div class="edge-toggle toggle-r" onclick="app.toggleSidebar('r')">▶</div>
            <div class="sidebar-inner">
                <div class="topic-sidebar-header">
                    <div class="header-row">
                        <span class="view-mode-label">View mode:</span>
                        <div class="view-mode-control"><button id="viewModeToggle" class="view-mode-btn">Focused</button></div>
                        <span></span>
                    </div>
                    <div class="header-row header-row-2">
                        <span class="sidebar-label">Topics</span>
                    </div>
                </div>
                <div class="topic-sidebar-container"><ul class="nav-list" id="toc"></ul></div>
            </div>
        </aside>

    </div>

    <!-- Core Runtime Logic -->
    <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
