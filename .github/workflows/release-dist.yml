name: Release Packed Dist

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/update (example: v2.0.0)"
        required: true
        default: "v0.0.0-dev"
      release_name:
        description: "Release title"
        required: true
        default: "Polyglot Dev Atlas"
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            NAME="${{ github.event.inputs.release_name }}"
            PRERELEASE="${{ github.event.inputs.prerelease }}"
          else
            TAG="${GITHUB_REF_NAME}"
            NAME="Polyglot Dev Atlas ${GITHUB_REF_NAME}"
            PRERELEASE="false"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build site
        run: python build_system/core.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Create dist archive
        shell: bash
        run: |
          ARCHIVE_NAME="polyglot-dev-atlas-${{ steps.meta.outputs.tag }}-dist.zip"
          (cd dist && zip -r "../${ARCHIVE_NAME}" .)
          echo "Created ${ARCHIVE_NAME}"

      - name: Create checksums
        shell: bash
        run: |
          ARCHIVE_NAME="polyglot-dev-atlas-${{ steps.meta.outputs.tag }}-dist.zip"
          sha256sum "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          make_latest: true
          files: |
            polyglot-dev-atlas-${{ steps.meta.outputs.tag }}-dist.zip
            polyglot-dev-atlas-${{ steps.meta.outputs.tag }}-dist.zip.sha256
